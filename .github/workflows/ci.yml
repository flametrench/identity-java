name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']

    name: Java ${{ matrix.java }}

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: flametrench_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      IDENTITY_POSTGRES_URL: postgresql://postgres:test@localhost:5432/flametrench_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout flametrench/ids-java
        # Bootstrap the upstream `ids` dep at the version the pom pins
        # (0.2.0-rc.1) until v0.2.x is published to Maven Central.
        uses: actions/checkout@v4
        with:
          repository: flametrench/ids-java
          ref: v0.2.0-rc.1
          path: _vendored/ids-java

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Install ids dep to local Maven repo
        run: mvn -B -f _vendored/ids-java/pom.xml install -DskipTests

      - name: Run tests
        run: mvn -B test
